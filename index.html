<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTracker Pro | ניהול תקציב</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ניהול כסף וחסכונות 💰</h1>
            <div class="balance-cards-container">
                <div class="balance-card">
                    <p>יתרה נזילה (בכיס)</p>
                    <h2 id="total-balance">₪0</h2>
                </div>
                <div class="balance-card savings-card">
                    <p>סך הכל חיסכון</p>
                    <h2 id="total-savings">₪0</h2>
                </div>
            </div>
            <div class="balance-cards-container" style="margin-top: 10px;">
                <div class="balance-card debt-card">
                    <p>חייבים לי</p>
                    <h2 id="total-debt">₪0</h2>
                </div>
                <div class="balance-card owed-card">
                    <p>אני חייב</p>
                    <h2 id="total-owed">₪0</h2>
                </div>
            </div>
        </header>

        <!-- אזור קופות חיסכון נפרד -->
        <section class="savings-section">
            <h3>הקופות שלי 🏦</h3>
            <div id="savings-targets-list" class="savings-grid"></div>
        </section>

        <section class="form-section">
            <h3>הוספת תנועה</h3>
            <form id="transaction-form">
                <input type="text" id="description" placeholder="תיאור (למשל: מחשב חדש, משכורת...)" required>
                <input type="number" id="amount" placeholder="סכום (₪)" required>
                <select id="type">
                    <option value="income">הכנסה 🟢</option>
                    <option value="expense">הוצאה 🔻</option>
                    <option value="debt">חייבים לי (⏳)</option>
                    <option value="owed">אני חייב (💸)</option>
                    <option value="savings">העברה לחיסכון 🏦</option>
                </select>
                <button type="submit" id="submit-btn">שמור פעולה</button>
            </form>
        </section>

        <section class="history-section">
            <h3>היסטוריית תנועות כללית</h3>
            <div id="transactions-list"></div>
        </section>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
