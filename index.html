<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTracker | ניהול חובות ותזרים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>ניהול כסף אישי 💸</h1>
            <div class="balance-cards-container">
                <div class="balance-card">
                    <p>יתרה בחשבון</p>
                    <h2 id="total-balance">₪0.00</h2>
                </div>
                <div class="balance-card debt-card">
                    <p>חייבים לי</p>
                    <h2 id="total-debt">₪0.00</h2>
                </div>
            </div>
        </header>

        <section class="form-section">
            <form id="transaction-form">
                <input type="text" id="description" placeholder="מה הפעולה? (למשל: פיצה, הלוואה ליוסי)" required>
                <input type="number" id="amount" placeholder="כמה? (₪)" required>
                <div class="type-toggle">
                    <select id="type">
                        <option value="expense">הוצאה 🔻</option>
                        <option value="income">הכנסה 🟢</option>
                        <option value="debt">חוב (חייבים לי) ⏳</option>
                    </select>
                </div>
                <button type="submit" id="submit-btn">שמור תנועה</button>
            </form>
        </section>

        <section class="history-section">
            <h3>היסטוריית פעולות</h3>
            <div id="transactions-list">
                <!-- כאן יופיעו הפעולות דרך ה-JS -->
            </div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
